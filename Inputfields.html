<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="Textstyles.css">
  <link rel="stylesheet" href="Inputfields.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="grid">
    <div class="header"><h1>Inputfields</h1></div>

    <div class="input_group">

      <div class="content">
        <div class="container_fill">
          <input class="input_default base" type="text" placeholder="Enter text..."><!-- input -->
        </div>
        <p class="base">Default text field.</p>
      </div>

      <div class="content">
        <div class="container_fill">
          <div class="input_leading_icon">
            <img src="icons/Name=Add, filled=true.svg" alt="" class="input_icon">
            <input class="base" type="text" placeholder="Enter text..."><!-- input with leading icon -->
          </div>
        </div>
        <p class="base">leading icon inputfield</p>
      </div>

      <div class="content">
        <div class="container_fill">
          <div class="custom_select">
            <div class="custom_select_trigger">
              <span class="base">Select an option</span>
              <img src="icons/chevron down.svg" class="select_chevron" alt="">
            </div>
            <ul class="custom_options">
              <li class="custom_option base" data-value="1">Option 1</li>
              <li class="custom_option base" data-value="2">Option 2</li>
              <li class="custom_option base" data-value="3">Option 3</li>
            </ul>
          </div>
        </div>
        <p class="base">Used for multiple options</p>
      </div>

    </div>
  </div><!-- grid -->

  <div class="grid">

    <div class="input_group">

      <div class="content">
        <div class="container_fill">
          <div class="input_url">
            <span class="url_prefix base">http://</span>
            <input class="base" type="url" placeholder="www.example.com"><!-- url input -->
          </div>
        </div>
        <p class="base">Used for link inputs — only accepts valid URLs</p>
      </div>

    </div><!-- input_group -->

  </div><!-- grid -->

  <script src="Inputfields.js"></script>

</body>
</html>
